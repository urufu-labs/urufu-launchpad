<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wolf mascot — mint face, anchor outline, matches the kawaii Mascot component -->
  <rect width="64" height="64" fill="#fff8e7"/>
  <!-- Left ear -->
  <path d="M 16 20 L 12 8 L 22 16 Z" fill="#c9e6ff" stroke="#3a2c3a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Right ear -->
  <path d="M 48 20 L 52 8 L 42 16 Z" fill="#c9e6ff" stroke="#3a2c3a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Head -->
  <ellipse cx="32" cy="34" rx="20" ry="18" fill="#c9e6ff" stroke="#3a2c3a" stroke-width="2.5"/>
  <!-- Left eye -->
  <circle cx="24" cy="32" r="2.5" fill="#3a2c3a"/>
  <!-- Right eye -->
  <circle cx="40" cy="32" r="2.5" fill="#3a2c3a"/>
  <!-- Cheek blush left -->
  <circle cx="20" cy="40" r="3" fill="#ffb3d1" opacity="0.7"/>
  <!-- Cheek blush right -->
  <circle cx="44" cy="40" r="3" fill="#ffb3d1" opacity="0.7"/>
  <!-- Snout -->
  <ellipse cx="32" cy="42" rx="6" ry="4" fill="#fff8e7" stroke="#3a2c3a" stroke-width="1.5"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="1.5" ry="1" fill="#3a2c3a"/>
  <!-- Mouth -->
  <path d="M 30 44 Q 32 46 34 44" fill="none" stroke="#3a2c3a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
